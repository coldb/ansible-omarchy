# Keep this file limited to local overrides so upstream Omarchy bindings
# do not get duplicated when ~/.config/hypr/bindings.conf sources it.
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER, J # Toggle window tiling
unbind = SUPER, K # Keybindings modal
unbind = SUPER, L # Workspace layout toggle

bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d
