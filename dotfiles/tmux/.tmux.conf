source-file -q ~/.config/tmux/tmux.conf

set-option -g default-shell /usr/bin/zsh

# Set the default prefix to ctrl+b
set -g prefix C-b
set -g prefix2 C-b

# Custom commands
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

# Reload config
unbind q
bind q source-file ~/.tmux.conf

# Move status bar to bottom
set -g status-position bottom

# vim-like pane switching
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Bind Meta (Alt) + vim navigation keys to resize panes by 5 units
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5

# Bind Control + vim navigation keys to resize panes continuously
bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-l resize-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '/usr/share/tmux-plugin-manager/tpm'
