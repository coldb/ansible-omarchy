- block:
  - name: Install zsh
    become: true
    package:
      name: zsh
    tags:
      - update
      - update-zsh

  - name: Configure Ghostty to use zsh
    ansible.builtin.lineinfile:
      path: "{{ home_dir }}/.config/ghostty/config"
      regexp: "^command\\s*="
      line: "command = /usr/bin/zsh"
      create: true

  - name: Check that .oh-my-zsh exists
    stat:
      path: "{{ home_dir }}/.oh-my-zsh"
    register: oh_my_stats

  - name: Install oh-my-zsh
    shell: >
      curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
      -o /tmp/oh-my-zsh-installer.sh &&
      chmod +x /tmp/oh-my-zsh-installer.sh &&
      /tmp/oh-my-zsh-installer.sh --unattended
    when: not oh_my_stats.stat.exists

  - name: Install zsh-autosuggestions plugin
    ansible.builtin.git:
      repo: 'https://github.com/zsh-users/zsh-autosuggestions.git'
      dest: "{{ home_dir }}/.oh-my-zsh/plugins/zsh-autosuggestions"

  - name: Check for existing zsh dotfiles
    stat:
      path: "{{ home_dir }}/{{ item }}"
    loop:
      - .zshrc
      - .zsh_profile
    register: zsh_dotfiles

  - name: Remove existing zsh dotfiles if not symlinks
    file:
      path: "{{ item.stat.path }}"
      state: absent
    loop: "{{ zsh_dotfiles.results }}"
    when: item.stat.exists and not item.stat.islnk

  - name: Stow zsh dotfiles
    command: "./stow_install"
    args:
      chdir: "{{ dotfiles_dir }}"
    environment:
      STOW_FOLDERS: "zsh"

  tags:
    - install
    - install-zsh
